<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹性圆盘游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="elastic-disc">
            <svg class="disc-svg" viewBox="0 -1350 1200 2850" preserveAspectRatio="xMidYMid meet">
                <!-- 碗形状 - 更像碗，底部圆滑稍平，放大3倍 -->
                <path class="disc-shape" d="M 600 350 C 950 350 1100 200 1100 60 Q 900 20 600 20 Q 300 20 100 60 C 100 200 250 350 600 350 Z" fill="#4CAF50" />
                <!-- 红球 - 放大3倍 -->
                <circle class="center-ball" cx="600" cy="210" r="72" fill="#ff4444" />
                <!-- 底部绿绳 - 分成24段实现渐变色（加粗5倍） -->
                <line class="disc-rope" id="rope-segment-1" x1="600" y1="350" x2="600" y2="365" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-2" x1="600" y1="365" x2="600" y2="380" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-3" x1="600" y1="380" x2="600" y2="395" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-4" x1="600" y1="395" x2="600" y2="410" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-5" x1="600" y1="410" x2="600" y2="425" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-6" x1="600" y1="425" x2="600" y2="440" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-7" x1="600" y1="440" x2="600" y2="455" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-8" x1="600" y1="455" x2="600" y2="470" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-9" x1="600" y1="470" x2="600" y2="485" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-10" x1="600" y1="485" x2="600" y2="500" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-11" x1="600" y1="500" x2="600" y2="515" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-12" x1="600" y1="515" x2="600" y2="530" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-13" x1="600" y1="530" x2="600" y2="545" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-14" x1="600" y1="545" x2="600" y2="560" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-15" x1="600" y1="560" x2="600" y2="575" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-16" x1="600" y1="575" x2="600" y2="590" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-17" x1="600" y1="590" x2="600" y2="605" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-18" x1="600" y1="605" x2="600" y2="620" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-19" x1="600" y1="620" x2="600" y2="635" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-20" x1="600" y1="635" x2="600" y2="650" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-21" x1="600" y1="650" x2="600" y2="665" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-22" x1="600" y1="665" x2="600" y2="680" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-23" x1="600" y1="680" x2="600" y2="695" stroke="#388E3C" stroke-width="240" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-24" x1="600" y1="695" x2="600" y2="710" stroke="#388E3C" stroke-width="240" stroke-linecap="round" />
            </svg>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
