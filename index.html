<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹性圆盘游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="elastic-disc">
            <svg class="disc-svg" viewBox="0 -2700 2400 5700" preserveAspectRatio="xMidYMid meet">
                <!-- 碗形状 - 更像碗，底部圆滑稍平，放大6倍 -->
                <path class="disc-shape" d="M 1200 700 C 1900 700 2200 400 2200 120 Q 1800 40 1200 40 Q 600 40 200 120 C 200 400 500 700 1200 700 Z" fill="#4CAF50" />
                <!-- 红球 - 放大6倍 -->
                <circle class="center-ball" cx="1200" cy="420" r="144" fill="#ff4444" />
                <!-- 底部绿绳 - 分成24段实现渐变色（加粗30倍） -->
                <line class="disc-rope" id="rope-segment-1" x1="1200" y1="700" x2="1200" y2="730" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-2" x1="1200" y1="730" x2="1200" y2="760" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-3" x1="1200" y1="760" x2="1200" y2="790" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-4" x1="1200" y1="790" x2="1200" y2="820" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-5" x1="1200" y1="820" x2="1200" y2="850" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-6" x1="1200" y1="850" x2="1200" y2="880" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-7" x1="1200" y1="880" x2="1200" y2="910" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-8" x1="1200" y1="910" x2="1200" y2="940" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-9" x1="1200" y1="940" x2="1200" y2="970" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-10" x1="1200" y1="970" x2="1200" y2="1000" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-11" x1="1200" y1="1000" x2="1200" y2="1030" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-12" x1="1200" y1="1030" x2="1200" y2="1060" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-13" x1="1200" y1="1060" x2="1200" y2="1090" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-14" x1="1200" y1="1090" x2="1200" y2="1120" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-15" x1="1200" y1="1120" x2="1200" y2="1150" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-16" x1="1200" y1="1150" x2="1200" y2="1180" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-17" x1="1200" y1="1180" x2="1200" y2="1210" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-18" x1="1200" y1="1210" x2="1200" y2="1240" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-19" x1="1200" y1="1240" x2="1200" y2="1270" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-20" x1="1200" y1="1270" x2="1200" y2="1300" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-21" x1="1200" y1="1300" x2="1200" y2="1330" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-22" x1="1200" y1="1330" x2="1200" y2="1360" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-23" x1="1200" y1="1360" x2="1200" y2="1390" stroke="#388E3C" stroke-width="480" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-24" x1="1200" y1="1390" x2="1200" y2="1420" stroke="#388E3C" stroke-width="480" stroke-linecap="round" />
            </svg>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
