<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹性圆盘游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="elastic-disc">
            <svg class="disc-svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid meet">
                <!-- 倒帐篷形状 -->
                <path class="disc-shape" d="M 200 110 L 380 20 Q 200 60 20 20 Z" fill="#4CAF50" />
                <!-- 红球 -->
                <circle class="center-ball" cx="200" cy="70" r="24" fill="#ff4444" />
                <!-- 底部绿绳 - 分成24段实现渐变色（延长3倍） -->
                <line class="disc-rope" id="rope-segment-1" x1="200" y1="110" x2="200" y2="115" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-2" x1="200" y1="115" x2="200" y2="120" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-3" x1="200" y1="120" x2="200" y2="125" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-4" x1="200" y1="125" x2="200" y2="130" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-5" x1="200" y1="130" x2="200" y2="135" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-6" x1="200" y1="135" x2="200" y2="140" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-7" x1="200" y1="140" x2="200" y2="145" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-8" x1="200" y1="145" x2="200" y2="150" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-9" x1="200" y1="150" x2="200" y2="155" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-10" x1="200" y1="155" x2="200" y2="160" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-11" x1="200" y1="160" x2="200" y2="165" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-12" x1="200" y1="165" x2="200" y2="170" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-13" x1="200" y1="170" x2="200" y2="175" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-14" x1="200" y1="175" x2="200" y2="180" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-15" x1="200" y1="180" x2="200" y2="185" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-16" x1="200" y1="185" x2="200" y2="190" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-17" x1="200" y1="190" x2="200" y2="195" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-18" x1="200" y1="195" x2="200" y2="200" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-19" x1="200" y1="200" x2="200" y2="205" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-20" x1="200" y1="205" x2="200" y2="210" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-21" x1="200" y1="210" x2="200" y2="215" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-22" x1="200" y1="215" x2="200" y2="220" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-23" x1="200" y1="220" x2="200" y2="225" stroke="#388E3C" stroke-width="16" stroke-linecap="butt" />
                <line class="disc-rope" id="rope-segment-24" x1="200" y1="225" x2="200" y2="230" stroke="#388E3C" stroke-width="16" stroke-linecap="round" />
            </svg>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
